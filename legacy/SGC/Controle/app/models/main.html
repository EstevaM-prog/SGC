<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sistema de gestão e acompanhamento de chamados">

  <link rel="icon" type="image/jpg" href="/assets/img/logo.jpg">
  <title>SGC - Chamados</title>

  <!-- Fontes e Ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">


  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../views/sgc.css">
</head>

<body class="dark">
  <div class="app-container">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <!-- Logo -->
      <div class="sidebar-header">
        <div class="logo-content">
          <div class="logo-mark">SGC</div>
          <div class="logo-text">
            <h1>Sistema de</h1>
            <p>Gerenciamento de Chamados</p>
          </div>
        </div>
      </div>

      <!-- New Ticket Button -->
      <div class="new-ticket-wrapper">
        <button id="btn-new-ticket" class="btn-new-ticket">
          <i data-lucide="plus" class="icon"></i>
          <span class="btn-text">Novo Chamado</span>
        </button>
      </div>

      <!-- Navigation -->
      <nav class="sidebar-nav">
        <button class="nav-item" data-view="dashboard">
          <i data-lucide="bar-chart-3" class="icon"></i>
          <span class="nav-text">Dashboard</span>
        </button>

        <button class="nav-item active" data-view="list">
          <i data-lucide="list" class="icon"></i>
          <span class="nav-text">Lista de Chamados</span>
        </button>

        <button class="nav-item" data-view="shopping">
          <i data-lucide="shopping-cart" class="icon"></i>
          <span class="nav-text">Compras</span>
        </button>

        <button class="nav-item" data-view="freight">
          <i data-lucide="truck" class="icon"></i>
          <span class="nav-text">Fretes</span>
        </button>
        
        <button class="nav-item" data-view="cnpj">
          <i data-lucide="table" class="icon"></i>
          <span class="nav-text">Tabela CNPJ</span>
        </button>

        <button class="nav-item" data-view="procedures">
          <i data-lucide="workflow" class="icon"></i>
          <span class="nav-text">Procedimentos</span>
        </button>

        <button class="nav-item" data-view="trash">
          <i data-lucide="trash-2" class="icon"></i>
          <span class="nav-text">Lixeira</span>
        </button>

        <button class="nav-item" data-view="suporte" type="button">
          <i data-lucide="headphones" class="icon"></i>
          <span class="nav-text">Suporte</span>
        </button>
      </nav>

    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top Bar -->
      <header class="top-bar">
        <div class="sidebar-controls">

        <!-- Controls -->
         <button id="toggle-sidebar" class="icon-btn" title="Recolher sidebar">
          <i data-lucide="panel-left" class="icon"></i>
        </button>
        <button id="toggle-theme" class="icon-btn" title="Alternar tema">
          <i data-lucide="sun" class="icon"></i>
        </button>
      </div>

        <!-- Search bar -->
        <div class="search-wrapper">
          <i data-lucide="search" class="search-icon"></i>
          <input type="search" id="global-search" placeholder="Pesquisar por número, status, CNPJ, razão social..."
            class="search-input">
        </div>

        <!-- Clock as Date bar -->
        <div class="clock-content">
            <div class="time-wrapper">
                <div id="weather-wrapper" class="weather-info" style="display: none; align-items: center; gap: 5px; margin-right: 10px;">
                    <i data-lucide="sun" id="weather-icon" class="w-4 h-4 text-warning"></i>
                    <span id="live-temp" style="font-weight: 600; font-size: 0.9rem;">--°C</span>
                </div>
                
                <i data-lucide="clock" class="w-4 h-4 text-muted-foreground"></i>
                <span id="live-time">00:00:00</span>
            </div>
            <span id="live-date">Carregando data...</span>
        </div>

        <!-- User Info -->
        <div class="sidebar-footer">
          <a href="../models/profile.html" class="profile-link" style="text-decoration: none; display: flex; align-items: center; gap: 12px;">
              
              <div class="user-info">
                  <p class="user-name" style="margin: 0; font-weight: 600;">Hello, <span id="usuario"></span>!</p>
                  <p class="user-role" style="margin: 0; font-size: 0.8rem; opacity: 0.7;">Administrador</p>
              </div>

              <div id="avatar" class="user-avatar" style="width: 40px; height: 40px; border-radius: 50%; overflow: hidden; display: flex; items-center: center; 
              justify-content: center; background-color: #e2e8f0; flex-shrink: 0;">
              </div>
          </a>
      </div>
      </header>

      <body>
        <script src="../controllers/sgc.js"></script>

  <script>
    // Initialize Lucide icons
    lucide.createIcons();
  </script>
      </body>

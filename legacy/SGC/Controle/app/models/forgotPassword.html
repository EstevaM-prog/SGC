<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: "hsl(240 5.9% 90%)",
                        background: "hsl(0 0% 100%)",
                        foreground: "hsl(240 10% 3.9%)",
                        primary: "hsl(240 5.9% 10%)",
                        "primary-foreground": "hsl(0 0% 98%)",
                        muted: "hsl(240 4.8% 95.9%)",
                        "muted-foreground": "hsl(240 3.8% 46.1%)",
                        card: "hsl(0 0% 100%)",
                        accent: "hsl(240 5.9% 10%)",
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-foreground">

    <div class="flex min-h-screen items-center justify-center px-4">
        <div class="w-full max-w-md space-y-8">
            
            <div class="text-center">
                <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-xl bg-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary-foreground"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </div>
                <h1 class="text-3xl font-bold tracking-tight text-foreground">Forgot password?</h1>
                <p class="mt-2 text-muted-foreground">No worries, we'll send you reset instructions.</p>
            </div>

            <div class="rounded-2xl border bg-card p-8 shadow-sm">
                <form class="space-y-5" onsubmit="handleResetPassword(event)">
                    
                    <div class="space-y-2">
                        <label for="email" class="text-sm font-medium leading-none">Email</label>
                        <div class="relative">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                            </span>
                            <input id="email" name="email" type="email" placeholder="you@example.com" required
                                class="flex h-10 w-full rounded-md border border-input bg-background px-10 py-2 text-sm focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 transition-all">
                        </div>
                    </div>

                    <button type="submit" class="inline-flex items-center justify-center rounded-md text-sm font-semibold ring-offset-background transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 bg-primary text-primary-foreground hover:bg-primary/90 h-11 px-4 py-2 w-full hover:shadow-lg duration-200">
                        Reset password
                    </button>
                </form>
            </div>

            <div class="text-center">
                <a href="../models/login.html" class="inline-flex items-center gap-2 text-sm font-medium text-muted-foreground hover:text-foreground transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
                    Back to log in
                </a>
            </div>
        </div>
    </div>

    <script>
        function handleResetPassword(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            
            // Simulação de lógica: Verifica se o e-mail existe no "banco" user_db
            const registeredUser = JSON.parse(localStorage.getItem('user_db'));
            
            if (registeredUser && email === registeredUser.email) {
                alert("Instructions sent to: " + email);
                // Aqui você poderia redirecionar para uma página de confirmação
            } else {
                alert("Email not found in our records.");
            }
        }
    </script>
</body>
</html>
